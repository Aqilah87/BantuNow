name: bantunow
description: "A community assistance mobile application for Kuala Terengganu"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  
  # UI & Navigation
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  
  # Icons
  flutter_svg: ^2.0.9

  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  firebase_storage: 12.4.10
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  http: ^1.2.0
  provider: ^6.1.2
  share_plus: ^7.2.1
  app_links: ^6.3.2
  firebase_dynamic_links: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true